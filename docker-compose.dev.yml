version: "3.8"

services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distrecoldb_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d distrecoldb_dev"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-dev
    env_file:
      - .env.dev
    ports:
      - "3101:3001"
    depends_on:
      postgres-dev:
        condition: service_healthy
    restart: unless-stopped

  frontend-dev:
    build:
      context: ../../front/production-control
      dockerfile: Dockerfile
      args:
        REACT_APP_USE_DEV_BACKEND: "true"
    container_name: frontend-dev
    depends_on:
      - backend-dev
    restart: unless-stopped

  gateway-dev:
    image: nginx:1.27-alpine
    container_name: gateway-dev
    ports:
      - "3100:80"
    volumes:
      - ./gateway/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-dev
      - backend-dev
    restart: unless-stopped

volumes:
  pgdata_dev:
